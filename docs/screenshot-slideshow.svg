<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="Inter, system-ui, sans-serif">
  <!-- Fullscreen black background -->
  <rect width="1200" height="680" fill="#000000"/>

  <!-- Top bar gradient -->
  <rect width="1200" height="60" fill="url(#navGrad)"/>
  <text x="24" y="34" font-size="14" font-weight="600" fill="rgba(255,255,255,0.7)" font-family="Montserrat, sans-serif">2 / 4</text>
  <text x="600" y="34" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.5)">TRP Product Range 2026</text>

  <!-- Close button -->
  <circle cx="1170" cy="28" r="16" fill="rgba(255,255,255,0.1)"/>
  <line x1="1163" y1="21" x2="1177" y2="35" stroke="#FFF" stroke-width="2"/>
  <line x1="1177" y1="21" x2="1163" y2="35" stroke="#FFF" stroke-width="2"/>

  <defs>
    <linearGradient id="navGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Left nav arrow -->
  <rect x="16" y="300" width="44" height="60" rx="8" fill="rgba(255,255,255,0.05)"/>
  <polyline points="44,318 30,330 44,342" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>

  <!-- Right nav arrow -->
  <rect x="1140" y="300" width="44" height="60" rx="8" fill="rgba(255,255,255,0.05)"/>
  <polyline points="1156,318 1170,330 1156,342" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>

  <!-- Main slide: Product Presentation -->
  <g transform="translate(180, 70)">
    <rect width="840" height="472" rx="4" fill="#0A0A0A"/>
    <!-- Accent bar -->
    <rect width="840" height="4" fill="#E31837"/>

    <!-- Left: product info -->
    <text x="52" y="64" font-size="12" font-weight="700" fill="#E31837" letter-spacing="2" font-family="Montserrat, sans-serif">DISC BRAKES / MTB</text>

    <text x="52" y="110" font-size="38" font-weight="800" fill="#FFFFFF" font-family="Montserrat, sans-serif">TRP DH-R EVO</text>

    <text x="52" y="140" font-size="16" fill="#B0B0B0">Race-Proven Stopping Power</text>

    <!-- Selling points with diamond markers -->
    <g transform="translate(52, 175)">
      <rect x="0" y="0" width="8" height="8" fill="#E31837" transform="rotate(45 4 4)"/>
      <text x="20" y="8" font-size="14" fill="#B0B0B0">4-piston forged caliper design</text>

      <rect x="0" y="32" width="8" height="8" fill="#E31837" transform="rotate(45 4 36)"/>
      <text x="20" y="40" font-size="14" fill="#B0B0B0">Tool-free pad replacement system</text>

      <rect x="0" y="64" width="8" height="8" fill="#E31837" transform="rotate(45 4 68)"/>
      <text x="20" y="72" font-size="14" fill="#B0B0B0">DOT 5.1 fluid compatible</text>

      <rect x="0" y="96" width="8" height="8" fill="#E31837" transform="rotate(45 4 100)"/>
      <text x="20" y="104" font-size="14" fill="#B0B0B0">CNC-machined from 6061-T6 aluminum</text>
    </g>

    <!-- Vertical divider -->
    <line x1="420" y1="40" x2="420" y2="430" stroke="#2A2A2A" stroke-width="1" opacity="0.5"/>

    <!-- Right: product image area -->
    <circle cx="630" cy="240" r="140" fill="#E31837" opacity="0.05"/>
    <circle cx="630" cy="240" r="100" fill="#E31837" opacity="0.04"/>

    <!-- Simplified brake caliper illustration -->
    <rect x="560" y="150" width="140" height="180" rx="16" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
    <rect x="575" y="165" width="110" height="60" rx="8" fill="#2A2A2A"/>
    <rect x="590" y="175" width="80" height="40" rx="4" fill="#333"/>
    <rect x="575" y="245" width="110" height="35" rx="4" fill="#222"/>
    <text x="630" y="267" text-anchor="middle" font-size="9" fill="#555">Product Image</text>

    <!-- Badge -->
    <rect x="730" y="22" width="88" height="28" rx="4" fill="#E31837"/>
    <text x="774" y="41" text-anchor="middle" font-size="11" fill="#FFFFFF" font-weight="700" letter-spacing="0.5">NEW 2026</text>
  </g>

  <!-- Bottom dots -->
  <g transform="translate(560, 560)">
    <circle cx="0" cy="0" r="4" fill="rgba(255,255,255,0.3)"/>
    <circle cx="20" cy="0" r="5" fill="#E31837"/>
    <circle cx="40" cy="0" r="4" fill="rgba(255,255,255,0.3)"/>
    <circle cx="60" cy="0" r="4" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Label -->
  <text x="600" y="618" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.25)">Fullscreen Slideshow Preview — Navigate with arrow keys, click dots, or use buttons</text>
</svg>
